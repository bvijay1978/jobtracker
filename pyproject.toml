# Tooling configuration only. Runtime dependencies live in requirements.txt
# (Streamlit apps are run from source, not installed as a package).

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
