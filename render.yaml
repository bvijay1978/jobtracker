databases:
  - name: jobtracker-db
    plan: free
    databaseName: jobtracker
    user: jobtracker

services:
  - type: web
    name: jobtracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --server.enableXsrfProtection false
      --server.enableCORS false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobtracker-db
          property: connectionString
      - key: APP_USERS
        value: "Vijay:vijay,Radha:radha"
      - key: APP_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false  # optional — only needed for the in-app AI CV/cover-letter drafting
